<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة الباحث الميداني</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', darkBg: '#111827', darkCard: '#1f2937' }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300">

    <header class="bg-white dark:bg-darkCard shadow-sm p-4 flex justify-between items-center sticky top-0 z-50 transition-colors duration-300">
        <div class="flex gap-4">
            <button id="drivingModeBtn" class="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-100 flex items-center justify-center transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>
            </button>
            <button id="themeToggleBtn" class="p-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-blue-100 flex items-center justify-center transition-all">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
        <div class="flex gap-2">
            <button class="tab-btn active px-4 py-2 font-bold rounded-lg bg-blue-600 text-white" data-target="inputSection">الإدخال</button>
            <button class="tab-btn px-4 py-2 font-bold rounded-lg bg-gray-200 dark:bg-gray-700 dark:text-white" data-target="contactsSection">العملاء</button>
            <button class="tab-btn px-4 py-2 font-bold rounded-lg bg-gray-200 dark:bg-gray-700 dark:text-white" data-target="reportsSection">التقارير</button>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div class="mb-6 bg-white dark:bg-darkCard p-4 rounded-xl shadow-sm">
            <label class="block text-sm font-medium mb-2 opacity-80">تحديد الفرع الحالي</label>
            <select id="branchSelect" class="w-full p-3 border dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 outline-none text-lg font-bold">
                <option value="القصر مول">القصر مول</option>
                <option value="سلام مول">سلام مول</option>
                <option value="المملكة">المملكة</option>
                <option value="الرياض غاليري">الرياض غاليري</option>
                <option value="ذا فيو مول">ذا فيو مول</option>
                <option value="ايست بلازا">ايست بلازا</option>
            </select>
        </div>

        <section id="inputSection" class="view-section block">
            <div class="bg-white dark:bg-darkCard rounded-2xl shadow-sm p-6 text-center">
                <input type="text" id="customerName" placeholder="اسم العميل (اختياري)" class="w-full mb-4 p-4 text-center text-xl border-b-2 dark:border-gray-600 bg-transparent outline-none focus:border-blue-500 transition-colors">
                
                <div class="h-16 mb-4 flex items-center justify-center">
                    <span id="displayNumber" class="text-4xl font-bold tracking-widest text-gray-800 dark:text-white"></span>
                </div>

                <div class="grid grid-cols-3 gap-4 mb-6" id="dialpad">
                    </div>

                <div class="flex justify-center gap-6">
                    <button id="clearBtn" class="w-16 h-16 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 5H9l-7 7 7 7h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
                    </button>
                    <button id="saveContactBtn" class="w-16 h-16 rounded-full bg-green-500 hover:bg-green-600 text-white flex items-center justify-center shadow-lg transition-transform transform active:scale-95">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    </button>
                </div>
            </div>
        </section>

        <section id="contactsSection" class="view-section hidden space-y-4">
            <div id="contactsList" class="space-y-4">
                </div>
        </section>

        <section id="reportsSection" class="view-section hidden">
            <div class="bg-white dark:bg-darkCard rounded-xl p-6 shadow-sm">
                <h2 class="text-xl font-bold mb-4">إحصائيات الأوسمة (الفرع الحالي)</h2>
                <div id="reportsContainer" class="space-y-3">
                    </div>
            </div>
        </section>

    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
