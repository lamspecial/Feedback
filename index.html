<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>نظام رضا العملاء</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-brand">
    <span class="icon-svg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg>
    </span> 
    رضا العملاء
  </div>
  <div style="display:flex;gap:.5rem;align-items:center">
    <button class="btn btn-ghost btn-sm" onclick="showPage('import')" style="font-size:.8rem">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px;"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      استيراد
    </button>
  </div>
</nav>

<div class="page active" id="page-dashboard">
  <div class="page-header">
    <h2 class="page-title">الرئيسية</h2>
    <button class="btn btn-secondary btn-sm" onclick="loadDashboard()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>
  </div>

  <div class="kpi-grid" id="kpi-grid">
    <div class="kpi-card"><div class="loading" style="width:20px;height:20px;border-width:2px;margin:.4rem auto"></div></div>
    <div class="kpi-card"></div><div class="kpi-card"></div><div class="kpi-card"></div>
  </div>

  <div class="card">
    <div class="card-header"><span class="card-title" style="color:var(--pos)">أبرز الإشادات</span></div>
    <div id="dash-pos"><div class="loading"></div></div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title" style="color:var(--neg)">أبرز الشكاوى</span></div>
    <div id="dash-neg"><div class="loading"></div></div>
  </div>
</div>

<div class="page" id="page-call">
  <div class="page-header">
    <h2 class="page-title">الاتصال</h2>
    <button class="btn btn-ghost btn-sm" id="change-branch-btn" onclick="resetCallScreen()" style="display:none">تغيير الفرع</button>
  </div>

  <div id="call-setup" class="card">
    <div class="form-group" style="margin-bottom:.75rem">
      <label class="form-label">اختر الفرع للبدء</label>
      <select class="form-control" id="call-branch-sel"></select>
    </div>
    <button class="btn btn-primary btn-block" onclick="startCalling()">بدء الاتصالات</button>
  </div>

  <div id="call-interface" style="display:none">
    <div class="call-progress">
      <span id="call-progress-txt" style="min-width:45px">0 / 0</span>
      <div class="progress-track"><div class="progress-fill" id="call-pbar"></div></div>
      <button class="btn btn-ghost btn-sm" onclick="skipCustomer()">
        تخطي
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
    </div>

    <div class="call-customer-card">
      <div>
        <div class="call-name" id="call-name">—</div>
        <div class="call-phone" id="call-phone">—</div>
      </div>
      <a id="call-tel" href="#" class="call-dial">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.82 19.79 19.79 0 01.4 2.18 2 2 0 012.18 0H5a2 2 0 012 1.72 12.05 12.05 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.05 12.05 0 002.81.7A2 2 0 0122 16.92z"/></svg>
      </a>
    </div>

    <div class="tags-label pos">الإيجابيات</div>
    <div class="tag-group" id="pos-tags"></div>

    <div class="tags-label neg">السلبيات</div>
    <div class="tag-group" id="neg-tags"></div>

    <div class="form-group">
      <label class="form-label">ملاحظات إيجابية</label>
      <textarea class="form-control" id="pos-notes" rows="2" placeholder="اكتب هنا..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">ملاحظات سلبية</label>
      <textarea class="form-control" id="neg-notes" rows="2" placeholder="اكتب هنا..."></textarea>
    </div>

    <button class="btn btn-success btn-block btn-xl" id="save-btn" onclick="saveSurveyAndNext()">
      حفظ والانتقال للعميل التالي
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
  </div>
</div>

<div class="page" id="page-customers">
  <div class="page-header">
    <h2 class="page-title">العملاء</h2>
  </div>

  <div class="form-group">
    <input type="search" class="form-control" placeholder="ابحث بالاسم أو الجوال..." oninput="searchCustomers(this.value)">
  </div>
  <div class="form-group">
    <select class="form-control" id="cust-branch-filter" onchange="filterCustBranch(this.value)">
      <option value="">جميع الفروع</option>
    </select>
  </div>

  <ul class="c-list" id="cust-list"><li><div class="loading"></div></li></ul>
  <button class="btn btn-secondary btn-block" id="load-more-btn" style="display:none" onclick="loadMoreCustomers()">تحميل المزيد</button>
</div>

<div class="page" id="page-profile">
  <div class="page-header">
    <button class="btn btn-ghost btn-sm" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      رجوع
    </button>
    <h2 class="page-title">سجل العميل</h2>
    <div style="width:56px"></div>
  </div>
  <div id="profile-content"><div class="loading"></div></div>
</div>

<div class="page" id="page-import">
  <div class="page-header">
    <button class="btn btn-ghost btn-sm" onclick="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 4px;"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
      رجوع
    </button>
    <h2 class="page-title">استيراد العملاء</h2>
    <div style="width:56px"></div>
  </div>

  <div class="card">
    <div class="form-group">
      <label class="form-label">الفرع</label>
      <select class="form-control" id="import-branch-sel"></select>
    </div>

    <div class="import-tabs">
      <button class="itab active" onclick="switchImportTab('text',this)">نص</button>
      <button class="itab" onclick="switchImportTab('excel',this)">Excel</button>
    </div>

    <div id="text-section">
      <div class="form-group">
        <label class="form-label">أرقام الجوال — كل رقم في سطر</label>
        <textarea class="form-control" id="import-text" rows="9"
          placeholder="0551111111 (محمد)&#10;0552222222 (خالد)&#10;0553333333"></textarea>
      </div>
    </div>

    <div id="excel-section" style="display:none">
      <label class="audio-area" onclick="document.getElementById('xlsx-input').click()">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="8" y1="13" x2="16" y2="13"></line><line x1="8" y1="17" x2="16" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          اضغط لاختيار ملف Excel
        </div>
        <div style="font-size:.78rem;margin-top:.4rem;color:var(--ink-3)">.xlsx / .xls</div>
        <input type="file" id="xlsx-input" accept=".xlsx,.xls" onchange="handleXlsx(this)" style="display:none">
      </label>
      <div id="xlsx-name" style="font-size:.84rem;color:var(--pos);display:none;margin-top:.4rem"></div>
    </div>

    <div class="prog-wrap" id="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
    <button class="btn btn-primary btn-block" id="import-btn" onclick="doImport()">بدء الاستيراد</button>
    <div class="import-result" id="import-result"></div>
  </div>
</div>

<div class="page" id="page-reports">
  <div class="page-header">
    <h2 class="page-title">التقارير</h2>
    <button class="btn btn-secondary btn-sm" onclick="loadReports()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>
  </div>

  <div class="branch-bar" id="rpt-branch-bar">
    <button class="bfilter active">جميع الفروع</button>
  </div>

  <div class="card">
    <div id="tag-report"><div class="loading"></div></div>
  </div>

  <div class="card" id="branch-cmp-card">
    <div class="card-header"><span class="card-title">مقارنة الفروع</span></div>
    <div id="branch-cmp"><div class="loading"></div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">آراء العملاء</span>
      <button class="btn btn-ghost btn-sm" onclick="refreshSnippets()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
      </button>
    </div>
    <div class="snippet-grid" id="snippets"><div class="loading"></div></div>
  </div>
</div>

<div class="page" id="page-admin">
  <div class="page-header">
    <h2 class="page-title">الإدارة</h2>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title">الفروع</span>
      <button class="btn btn-primary btn-sm" onclick="toggleAddBranch()">+ إضافة</button>
    </div>
    <div class="inline-add" id="add-branch-form">
      <input type="text" class="form-control" id="new-branch-name" placeholder="اسم الفرع">
      <button class="btn btn-success btn-sm" onclick="addBranch()">إضافة</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAddBranch()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <ul class="admin-list" id="branch-list"><li><div class="loading"></div></li></ul>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title" style="color:var(--pos)">الوسوم الإيجابية</span>
      <button class="btn btn-success btn-sm" onclick="toggleAddTag('positive')">+ إضافة</button>
    </div>
    <div class="inline-add" id="add-pos-tag-form">
      <input type="text" class="form-control" id="new-pos-tag" placeholder="اسم الوسم">
      <button class="btn btn-success btn-sm" onclick="addTag('positive')">إضافة</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAddTag('positive')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <ul class="admin-list" id="pos-tag-list"></ul>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-title" style="color:var(--neg)">الوسوم السلبية</span>
      <button class="btn btn-danger btn-sm" onclick="toggleAddTag('negative')">+ إضافة</button>
    </div>
    <div class="inline-add" id="add-neg-tag-form">
      <input type="text" class="form-control" id="new-neg-tag" placeholder="اسم الوسم">
      <button class="btn btn-danger btn-sm" onclick="addTag('negative')">إضافة</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleAddTag('negative')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <ul class="admin-list" id="neg-tag-list"></ul>
  </div>
</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="bnav-item active" data-p="dashboard" onclick="showPage('dashboard',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    الرئيسية
  </button>
  <button class="bnav-item" data-p="call" onclick="showPage('call',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.82 19.79 19.79 0 01.4 2.18 2 2 0 012.18 0H5a2 2 0 012 1.72 12.05 12.05 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.05 12.05 0 002.81.7A2 2 0 0122 16.92z"/></svg>
    الاتصال
  </button>
  <button class="bnav-item" data-p="customers" onclick="showPage('customers',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    العملاء
  </button>
  <button class="bnav-item" data-p="reports" onclick="showPage('reports',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    التقارير
  </button>
  <button class="bnav-item" data-p="admin" onclick="showPage('admin',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M12 14c-6 0-8 2-8 3v1h16v-1c0-1-2-3-8-3z"/></svg>
    الإدارة
  </button>
</nav>

<script type="module" src="app.js"></script>
</body>
</html>
